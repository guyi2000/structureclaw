name: Analysis Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/cli/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/workflows/analysis-regression.yml'
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'scripts/cli/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/workflows/analysis-regression.yml'

jobs:
  analysis-regression:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies & Build
        run: |
          npm ci --prefix backend
          npm run build --prefix backend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare Analysis Virtualenv
        shell: bash
        run: |
          python -m venv backend/.venv
          if [ -f backend/.venv/Scripts/python.exe ]; then
            VENV_PY=backend/.venv/Scripts/python.exe
          else
            VENV_PY=backend/.venv/bin/python
          fi
          "$VENV_PY" -m pip install --upgrade pip
          "$VENV_PY" -m pip install -r backend/src/agent-skills/analysis/runtime/requirements.txt

      - name: Run Analysis Regression
        shell: bash
        # CI may not always provide a usable OpenSeesPy runtime on Linux.
        # The regression suite still verifies unavailable-engine signaling,
        # auto-fallback routing, and the non-OpenSees regression surface.
        run: node tests/runner.mjs analysis-regression
