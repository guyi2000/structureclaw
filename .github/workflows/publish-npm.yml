name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      NEXT_TELEMETRY_DISABLED: 1

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Ensure tag is from master branch
        run: |
          git fetch origin master
          if git merge-base --is-ancestor $GITHUB_SHA origin/master; then
            echo "✅ Tag is on master branch"
          else
            echo "❌ Tag is NOT on master branch"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Backend lint
        run: npm run lint --prefix backend

      - name: Backend tests
        run: npm test --prefix backend -- --runInBand

      - name: Frontend type check
        run: npm run type-check --prefix frontend

      - name: Build backend
        run: npm run build --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Parse version & dist-tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ $VERSION == *"-alpha."* ]]; then
            echo "dist_tag=alpha" >> $GITHUB_OUTPUT
          elif [[ $VERSION == *"-beta."* ]]; then
            echo "dist_tag=beta" >> $GITHUB_OUTPUT
          elif [[ $VERSION == *"-rc."* ]]; then
            echo "dist_tag=rc" >> $GITHUB_OUTPUT
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set version
        run: npm version --allow-same-version ${{ steps.meta.outputs.version }} --no-git-tag-version

      - name: Assemble package
        run: node scripts/prepare-package.js

      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | head -40
          echo "---"
          echo "Package size:"
          npm pack --dry-run 2>&1 | tail -1

      - name: Publish
        run: npm publish --access public --tag ${{ steps.meta.outputs.dist_tag }} --provenance
