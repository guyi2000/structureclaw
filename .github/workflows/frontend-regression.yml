name: Frontend Regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-regression.yml'
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-regression.yml'

permissions:
  contents: read

jobs:
  frontend-regression:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Frontend type-check
        run: npm run type-check --prefix frontend

      - name: Frontend lint
        run: npm run lint --prefix frontend

      - name: Frontend unit tests
        run: npm run test:run --prefix frontend
