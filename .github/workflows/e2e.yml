name: E2E Tests

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'backend/src/api/**'
      - 'backend/src/services/**'
      - 'backend/src/index.ts'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

jobs:
  check-permission:
    permissions:
      contents: read
      pull-requests: read
      issues: write
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/test-e2e') &&
       (github.event.comment.user.login == 'guyi2000' || github.event.comment.user.login == 'qinsz01'))
    runs-on: ubuntu-latest
    outputs:
      pr_sha: ${{ steps.get-ref.outputs.sha }}
      trigger_issue_number: ${{ steps.get-ref.outputs.issue_number }}
      trigger_comment_user: ${{ steps.get-ref.outputs.comment_user }}
    steps:
      - name: Get PR Reference
        id: get-ref
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            PR_URL="${{ github.event.issue.pull_request.url }}"
            SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$PR_URL" | jq -r .head.sha)
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "::error::Failed to resolve PR head SHA"
              exit 1
            fi
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "comment_user=${{ github.event.comment.user.login }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "comment_user=" >> "$GITHUB_OUTPUT"
          fi

      - name: Reply with Action Link
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COMMENT_TOKEN }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `✅ **E2E Tests Triggered!**`,
              ``,
              `@${context.payload.comment.user.login}, I've started the workflow for you.`,
              `Please click the link below to monitor progress and **approve the deployment** to the test environment:`,
              ``,
              `🚀 **[View Action Run Details](${runUrl})**`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

  e2e:
    needs: check-permission
    permissions:
      contents: read
      issues: write
    environment: test
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ github.event.issue.number || github.sha }}
      cancel-in-progress: true
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-permission.outputs.pr_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Setup via sclaw
        run: node ./sclaw doctor

      - name: Build via sclaw
        run: node ./sclaw build

      - name: Setup backend database
        run: |
          mkdir -p $HOME/.structureclaw/data
          npm run db:deploy --prefix backend
        env:
          DATABASE_URL: file:$HOME/.structureclaw/data/test-e2e.db

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install chromium --with-deps

      - name: Write test config to settings.json
        run: |
          SETTINGS_PATH="$HOME/.structureclaw/settings.json"
          TMP=$(mktemp)
          jq --arg key "${{ secrets.LLM_API_KEY }}" \
             --arg model "${{ vars.LLM_MODEL }}" \
             --arg baseUrl "${{ vars.LLM_BASE_URL }}" \
             --arg dbUrl "file:$HOME/.structureclaw/data/test-e2e.db" \
             '.llm = (.llm // {}) | .llm.apiKey = $key | .llm.model = $model | .llm.baseUrl = $baseUrl | .database = (.database // {}) | .database.url = $dbUrl' \
             "$SETTINGS_PATH" > "$TMP" && mv "$TMP" "$SETTINGS_PATH"

      - name: Start backend
        run: node backend/dist/index.js &
        env:
          SCLAW_FRONTEND_DIR: ${{ github.workspace }}/frontend/out
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

      - name: Wait for backend
        run: npx wait-on http://localhost:31415/api/v1 --timeout 30000

      - name: Run E2E tests
        id: run-tests
        run: |
          set -o pipefail
          npm run test:e2e --prefix frontend 2>&1 | tee test-output.txt
        env:
          CI: true
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}

      - name: Extract test summary
        if: always()
        id: summary
        run: |
          if [ ! -f test-output.txt ]; then
            echo "summary=Tests did not produce output." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SUMMARY=$(grep -E '^[[:space:]]*[0-9]+ (passed|failed).*\(([0-9]+m[[:space:]]+)?[0-9]+(\.[0-9]+)?(m|s)\)' test-output.txt || grep -E '^[[:space:]]*[0-9]+ failed' test-output.txt || echo "No summary found")
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Report results on PR
        if: always() && needs.check-permission.outputs.trigger_issue_number != ''
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COMMENT_TOKEN }}
          script: |
            const issueNumber = Number('${{ needs.check-permission.outputs.trigger_issue_number }}');
            const commentUser = '${{ needs.check-permission.outputs.trigger_comment_user }}';
            const success = '${{ steps.run-tests.outcome }}' === 'success';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const summary = ${{ toJson(steps.summary.outputs.summary) }};
            const icon = success ? '✅' : '❌';
            const status = success ? 'PASSED' : 'FAILED';
            const body = [
              `${icon} **E2E Tests ${status}**`,
              ``,
              `@${commentUser}, the test run has completed.`,
              ``,
              '```',
              summary,
              '```',
              ``,
              `📦 **[Download Logs](${runUrl})** or check the Artifacts section.`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
