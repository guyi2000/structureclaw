name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/src/api/**'
      - 'backend/src/services/**'
      - 'backend/src/index.ts'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/e2e.yml'
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'backend/src/api/**'
      - 'backend/src/services/**'
      - 'backend/src/index.ts'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Setup backend database and build
        run: |
          mkdir -p .runtime/data
          npm run db:deploy --prefix backend
          npm run build --prefix backend
        env:
          DATABASE_URL: file:../../.runtime/data/test-e2e.db

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install chromium --with-deps

      - name: Start backend
        run: node backend/dist/index.js &
        env:
          PORT: 30010
          DATABASE_URL: file:../../.runtime/data/test-e2e.db
          LLM_PROVIDER: openai
          LLM_API_KEY: test-key-for-e2e
          LLM_MODEL: gpt-4o-mini
          REDIS_URL: disabled

      - name: Start frontend
        run: cd frontend && npx next dev -p 30000 &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:30010

      - name: Wait for services
        run: |
          npx wait-on http://localhost:30010/api/v1 --timeout 30000
          npx wait-on http://localhost:30000 --timeout 60000

      - name: Run E2E tests
        run: npm run test:e2e --prefix frontend
        env:
          CI: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
