name: Install smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/workflows/install-smoke.yml'
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/workflows/install-smoke.yml'

jobs:
  native-install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies for OpenSeesPy
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gfortran libopenblas-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Setup via sclaw
        run: node ./sclaw doctor

      - name: Generate Prisma client
        run: npm run db:generate --prefix backend

      - name: Build via sclaw
        run: node ./sclaw build

      - name: Frontend type-check
        run: npm run type-check --prefix frontend

      - name: Frontend unit tests
        run: npm run test:run --prefix frontend

      - name: Frontend lint
        run: npm run lint --prefix frontend

      - name: Backend lint
        run: npm run lint --prefix backend
