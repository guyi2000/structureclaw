name: Install smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.cn.yml'
      - 'docker/**'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/workflows/install-smoke.yml'
  push:
    branches:
      - master
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.cn.yml'
      - 'docker/**'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'tests/**'
      - 'sclaw'
      - 'sclaw_cn'
      - 'package.json'
      - '.github/workflows/install-smoke.yml'

jobs:
  native-install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Setup via sclaw
        run: node ./sclaw doctor

      - name: Build via sclaw
        run: node ./sclaw build

      - name: Frontend type-check
        run: npm run type-check --prefix frontend

      - name: Frontend unit tests
        run: npm run test:run --prefix frontend

      - name: Frontend lint
        run: npm run lint --prefix frontend

      - name: Backend lint
        run: npm run lint --prefix backend

  docker-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Docker compose smoke
        shell: bash
        run: node tests/runner.mjs smoke-docker

  docker-compose-smoke-windows:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Verify Docker is ready
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          Write-Host 'Waiting for Docker...'
          while ($attempt -lt $maxAttempts) {
            try {
              $result = docker version --format '{{.Server.Os}}/{{.Server.Arch}} {{.Server.Version}}' 2>$null
              if ($LASTEXITCODE -eq 0 -and $result) {
                Write-Host "Docker is ready: $result"
                break
              }
            } catch {}
            $attempt++
            Start-Sleep -Seconds 5
          }
          if ($attempt -eq $maxAttempts) {
            throw 'Docker failed to start'
          }
      - name: Docker compose smoke
        shell: powershell
        run: node tests/runner.mjs smoke-docker
